<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coffee.</title>

<link rel="stylesheet" href="style.css">

<script src="script.js" defer></script>

</head>


<body>


<div class="app">


<section id="welcomeScreen">

<h1>Coffee.</h1>

<p>Your family coffee shop ☕</p>


<input 
id="nameInput"
type="text"
placeholder="Your name">


<button onclick="startApp()">
Start ☕
</button>


</section>





<section id="categoryScreen" style="display:none;">


<h2 id="helloUser"></h2>

<p>What would you like?</p>



<button class="category" onclick="openCategory('Coffee')">
☕<br>Coffee
</button>


<button class="category" onclick="openCategory('Tea')">
🍵<br>Tea
</button>


<button class="category" onclick="openCategory('Food')">
🍔<br>Food
</button>


<button class="category" onclick="openCategory('Snack')">
🍪<br>Snack
</button>


<button class="category" onclick="openCategory('Drink')">
🥤<br>Drink
</button>


<button onclick="showCart()">
🛒 View cart
</button>


</section>







<section id="productScreen" style="display:none;">


<h2 id="productTitle"></h2>


<div id="productList"></div>



<button onclick="backToCategories()">
← Back
</button>


<button onclick="showCart()">
🛒 Cart
</button>


</section>








<section id="cartScreen" style="display:none;">


<h2>
🛒 Your order
</h2>


<div id="cartList"></div>


<h3 id="totalItems"></h3>



<h3>
📝 Notes
</h3>


<textarea 
id="orderNote"
placeholder="Any special request?">
</textarea>




<button onclick="sendOrder()">
Send order 🚀
</button>



<button onclick="backToCategories()">
Continue shopping
</button>



</section>








<section id="confirmationScreen" style="display:none;">


<h1>
✅ Order sent!
</h1>


<p>
Thank you for choosing Coffee. ☕
</p>


<p>
Your order is being prepared.
</p>


<button onclick="newOrder()">
Start new order
</button>


</section>




</div>


</body>


</html>
