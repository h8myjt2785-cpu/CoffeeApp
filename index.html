<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Coffee.</title>

    <link rel="stylesheet" href="style.css">

    <script src="script.js" defer></script>

</head>


<body>


<div class="app">


    <!-- Inicio -->

    <section id="welcomeScreen">

        <h1>Coffee.</h1>

        <p>
            Your family coffee shop
        </p>


        <input 
            id="nameInput"
            type="text"
            placeholder="Your name"
        >


        <button onclick="startApp()">
            Start ☕
        </button>


    </section>




    <!-- Categorías -->

    <section id="categoryScreen" style="display:none;">

        <h2 id="helloUser">
            Hello 👋
        </h2>


        <p>
            What would you like?
        </p>


        <button class="category" onclick="openCategory('Coffee')">
            ☕<br>
            Coffee
        </button>


        <button class="category" onclick="openCategory('Tea')">
            🍵<br>
            Tea
        </button>


        <button class="category" onclick="openCategory('Food')">
            🍔<br>
            Food
        </button>


        <button class="category" onclick="openCategory('Snack')">
            🍪<br>
            Snack
        </button>


        <button class="category" onclick="openCategory('Drink')">
            🥤<br>
            Drink
        </button>


    </section>




    <!-- Productos -->

    <section id="productScreen" style="display:none;">

        <h2 id="productTitle">
            Products
        </h2>


        <div id="productList">

        </div>


        <button onclick="backToCategories()">
            ← Back
        </button>


    </section>




    <!-- Carrito -->

    <section id="cartScreen" style="display:none;">

        <h2>
            🛒 Your order
        </h2>


        <div id="cartList">

        </div>


        <button onclick="backToCategories()">
            Continue shopping
        </button>


    </section>


</div>


</body>

</html>
